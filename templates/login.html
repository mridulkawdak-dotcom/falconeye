```html
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Secure Banking Portal</title>

    <style>

        body {

            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #0f172a, #1e293b);
            color: white;
        }

        .container {

            width: 350px;
            margin: 100px auto;
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.5);

            backdrop-filter: blur(10px);
        }

        h2 {

            text-align: center;
            margin-bottom: 25px;
        }

        input {

            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 5px;
            outline: none;
        }

        button {

            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border: none;
            border-radius: 5px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {

            background: #1d4ed8;
        }

        .footer {

            margin-top: 20px;
            text-align: center;
            color: #94a3b8;
            font-size: 12px;
        }

        .logo {

            text-align: center;
            font-size: 28px;
            margin-bottom: 10px;
            color: #60a5fa;
        }

        .warning {

            text-align: center;
            color: #f87171;
            margin-top: 15px;
            font-size: 13px;
        }

    </style>

</head>

<body>

    <div class="container">

        <div class="logo">
            Falcon National Bank
        </div>

        <h2>Secure Customer Login</h2>

        <form method="POST" action="/login">

            <input type="text"
                   name="username"
                   placeholder="Customer ID"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit">
                Login
            </button>

        </form>

        <div class="warning">
            Unauthorized access is prohibited.
        </div>

        <div class="footer">
            Secured by FalconEye Threat Defense
        </div>

    </div>

</body>

</html>
