<!DOCTYPE html>
<html>

<head>

    <title>FalconEye Dashboard</title>

    <style>

        body{
            background:#0f172a;
            color:white;
            font-family:Arial;
            margin:0;
            padding:0;
        }

        header{
            background:#1e293b;
            padding:20px;
            text-align:center;
            font-size:30px;
        }

        .container{
            width:90%;
            margin:auto;
            margin-top:20px;
        }

        .card{

            background:#1e293b;
            padding:20px;
            border-radius:10px;
            margin-bottom:20px;
        }

        .attack{
            border-bottom:1px solid #334155;
            padding:10px;
        }

    </style>

</head>

<body>

<header>
    FalconEye Threat Dashboard
</header>

<div class="container">

    <div class="card">

        <h2>Recent Attacks</h2>

        {% for log in logs %}

        <div class="attack">

            <strong>IP:</strong>
            {{ log.ip }}

            <br>

            <strong>Attack:</strong>
            {{ log.attack_type }}

            <br>

            <strong>Risk:</strong>
            {{ log.risk_score }}

            <br>

            <strong>Country:</strong>
            {{ log.location.country }}

            <br>

            <strong>City:</strong>
            {{ log.location.city }}

            <br>

            <strong>ISP:</strong>
            {{ log.location.isp }}

        </div>

        {% endfor %}

    </div>

</div>

</body>

</html>
